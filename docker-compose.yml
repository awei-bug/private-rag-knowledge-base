version: "3.9"

services:
  app:
    build:
      context: .
    container_name: enterprise-rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env.production.example
    environment:
      RAG_DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/ragdb
      RAG_DATABASE_ECHO: "false"
      RAG_DATABASE_POOL_SIZE: "10"
      RAG_DATABASE_MAX_OVERFLOW: "20"
      RAG_DATABASE_CONNECT_TIMEOUT: "5"
      RAG_STORAGE_LOCAL_ROOT: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: enterprise-rag-frontend
    ports:
      - "8080:80"
    depends_on:
      - app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-rag-postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: enterprise-rag-redis
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: enterprise-rag-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

volumes:
  postgres_data:
  uploads_data:
