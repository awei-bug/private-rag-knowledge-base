services:
  app:
    build:
      context: .
    container_name: enterprise-rag-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      RAG_DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/ragdb
      RAG_DATABASE_ECHO: "false"
      RAG_DATABASE_POOL_SIZE: "10"
      RAG_DATABASE_MAX_OVERFLOW: "20"
      RAG_DATABASE_CONNECT_TIMEOUT: "5"
      RAG_STORAGE_LOCAL_ROOT: /data/uploads
      RAG_BACKUP_LOCAL_ROOT: /data/backups
    volumes:
      - app_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: enterprise-rag-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: enterprise-rag-redis
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: enterprise-rag-opensearch
    restart: unless-stopped
    profiles:
      - search
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
volumes:
  postgres_data:
  app_data:
